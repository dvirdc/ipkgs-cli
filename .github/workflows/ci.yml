name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  # ── 2. Test matrix ───────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q

  # ── 3. Bump version, build, publish (push to main only, not version bumps)
  release:
    needs: [lint, test]
    runs-on: ubuntu-latest
    # Skip if this push is the automated version-bump commit itself
    if: |
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write   # push version-bump commit + tag

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT or the default GITHUB_TOKEN — fetch full history for tagging
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      # ── Bump patch version in pyproject.toml ─────────────────────────────
      - name: Bump patch version
        id: bump
        run: |
          python - <<'EOF'
          import re, pathlib

          path = pathlib.Path("pyproject.toml")
          text = path.read_text()

          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")

          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))
          new_version = f"{major}.{minor}.{patch + 1}"
          new_text = text[:match.start()] + f'version = "{new_version}"' + text[match.end():]
          path.write_text(new_text)
          print(f"Bumped {major}.{minor}.{patch} → {new_version}")

          # Write new version to GitHub output
          import os
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new_version}\n")
          EOF

      # ── Commit version bump back to the branch ────────────────────────────
      - name: Commit & tag version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

      # ── Build sdist + wheel ───────────────────────────────────────────────
      - name: Build
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      # ── Publish to PyPI ───────────────────────────────────────────────────
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: dist/*
